<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login</title>
    <style>
        /* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* Background */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #4facfe, #a18cd1);
}

/* Login Box */
.login-box {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(15px);
    padding: 35px;
    width: 280px;
    border-radius: 20px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Title */
.login-box h2 {
    margin-bottom: 20px;
}

/* Inputs */
.login-box input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    outline: none;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 14px;
}

/* Placeholder color */
.login-box input::placeholder {
    color: #eee;
}

/* Button */
.login-box button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #00f2fe, #4facfe);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

/* Button hover */
.login-box button:hover {
    transform: scale(1.05);
}

/* Error text */
#error {
    margin-top: 10px;
    font-size: 14px;
}
    </style>
</head>
<body>

<div class="container">
    <div class="login-box">
    <h2>Staff Login</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="role" placeholder="Enter Role">
    <input type="text" id="code" placeholder="Enter Verification Code">

    <button onclick="checkLogin()">Login</button>

    <p id="error" style="color:red;"></p>
</div>
</div>
<script>
async function checkLogin() {
    let name = document.getElementById("name").value.trim();
    let role = document.getElementById("role").value.trim();
    let code = document.getElementById("code").value.trim();

    // validation (empty check)
    if (!name || !role || !code) {
        document.getElementById("error").innerText = "Please fill all fields!";
        return;
    }

    try {
        // fetch JSON file
        let response = await fetch("staff.json");

        if (!response.ok) {
            throw new Error("JSON not loaded");
        }

        let data = await response.json();

        // check user
        let user = data.find(item =>
            item.name.toLowerCase() === name.toLowerCase() &&
            item.role.toLowerCase() === role.toLowerCase() &&
            item.code === code
        );

        if (user) {
            // save data (optional)
            localStorage.setItem("staffName", user.name);
            localStorage.setItem("staffRole", user.role);

            // redirect
            window.location.href = "staff.html";
        } else {
            document.getElementById("error").innerText = "Invalid Details!";
        }

    } catch (error) {
        document.getElementById("error").innerText = "Error loading data!";
        console.error(error);
    }
}
</script>

</body>
</html>
